name: Atualizar taxas_bacen.json

on:
  workflow_dispatch:
  schedule:
    # A cada 15 minutos (UTC)
    - cron: "7,22,37,52 * * * *"

concurrency:
  group: taxas-bacen-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run taxas updater
        run: |
          python update_taxas.py

      - name: Validate output
        run: |
          python - <<'PY'
          import json

          with open("taxas_bacen.json", "r", encoding="utf-8") as f:
              d = json.load(f)

          assert isinstance(d.get("meta", {}).get("generated_at_utc"), str)
          assert isinstance(d.get("taxas", {}).get("selic"), (int, float))
          assert isinstance(d.get("taxas", {}).get("cdi"), (int, float))
          print("Output OK")
          PY

      - name: Show preview
        run: |
          sed -n '1,120p' taxas_bacen.json || true
          git status --short

      - name: Commit if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add taxas_bacen.json
          git commit -m "chore(data): atualizar taxas_bacen.json"
          git push
